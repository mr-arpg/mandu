name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/package-lock.json
      - run: npm ci
      # Vite reads `GITHUB_PAGES_BASE` to set the asset base path. For a project
      # site at `https://<user>.github.io/<repo>/`, the base must be `/<repo>/`.
      - name: Build static demo
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: npm run build:github-pages
      # GH Pages SPA fallback: copy index.html to 404.html so direct deep links
      # (e.g. /demo) resolve back to the SPA instead of returning 404.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: code/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
